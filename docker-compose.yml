version: "3.9"

services:
  db:
    image: mariadb:11
    container_name: metari-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 10  
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: metari-backend
    restart: always   
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      ENVIRONMENT: production
    command: >
      sh -c " mkdir -p uploads/proofs && npx prisma generate && npm run migrate:apply && npm run seed && npm start "

  frontend:
    build: ./metari-app
    container_name: metari-frontend
    restart: always
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    container_name: metari-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    command: >
      sh -c "mkdir -p /etc/nginx/ssl && \
      openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
        -keyout /etc/nginx/ssl/server.key \
        -out /etc/nginx/ssl/server.crt \
        -subj '/C=ES/ST=Barcelona/L=Barcelona/O=Metari/CN=localhost' 2>/dev/null && \
      nginx -g 'daemon off;'"

volumes:
  db_data:
